name: Docker Build and Publish

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Get project version
        id: get_version
        run: |
          VERSION=$(grep '^version =' pyproject.toml | head -n 1 | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Downcase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        
      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/facmgr-server:latest
            ghcr.io/${{ env.REPO }}/facmgr-server:${{ env.VERSION }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
            
      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile_client
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}/facmgr-client:latest
            ghcr.io/${{ env.REPO }}/facmgr-client:${{ env.VERSION }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client